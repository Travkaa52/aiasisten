name: Telegram AI Assistant

on:
  schedule:
    # Каждые 5 минут. GitHub гарантирует лишь "не чаще, чем раз в 5 минут",
    # фактический интервал может немного плавать под нагрузкой платформы.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: telegram-ai-assistant
  cancel-in-progress: false

jobs:
  run-assistant:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime directories
        run: mkdir -p data logs assistant/cache/storage

      - name: Restore persisted database (if present)
        uses: actions/cache@v4
        with:
          path: data
          key: assistant-db-${{ github.run_id }}
          restore-keys: |
            assistant-db-

      - name: Run assistant
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION: ${{ secrets.SESSION }}
          OWNER_IDS: ${{ secrets.OWNER_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_DURATION_SECONDS: ${{ vars.RUN_DURATION_SECONDS }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          WHITELIST_MODE: ${{ vars.WHITELIST_MODE }}
        run: python -m assistant.main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
