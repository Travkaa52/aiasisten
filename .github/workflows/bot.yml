name: Telegram Bot (long-running via scheduled runs)

# ⚠️  ВАЖНО ПРО GITHUB ACTIONS ДЛЯ ДОЛГОЖИВУЩЕГО БОТА
# GitHub-раннеры не умеют работать вечно: у джобы жёсткий потолок 6 часов,
# а сама виртуалка после каждого запуска УДАЛЯЕТСЯ вместе с локальными
# файлами. Поэтому это workflow периодически перезапускает бота (cron) и
# сохраняет базу данных (bot.db) между запусками через Actions Artifacts,
# чтобы история диалогов, пользователи и настройки не терялись.
#
# Это рабочее решение для старта и для небольшой нагрузки, но оно НЕ такое
# надёжное, как обычный сервер: между перезапусками возможен разрыв в
# несколько секунд, а при сбое раннера возможна потеря последних минут
# истории. Для боевого использования смотри README → раздел "Деплой" —
# там есть Docker и systemd вариант на VPS, которые работают действительно
# 24/7 без перерывов.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Перезапуск каждые 6 часов — джоба сама завершится штатно за 10 минут
    # до этой отметки, а новый запуск подхватит сохранённую базу.
    - cron: "0 */6 * * *"

# Не даём двум копиям бота работать одновременно (иначе Telegram API
# начнёт отдавать 409 Conflict на getUpdates). Новый запуск дожидается
# завершения предыдущего.
concurrency:
  group: telegram-bot-polling
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Хард-лимит GitHub-раннера — 360 минут. Берём с запасом, чтобы успеть
    # штатно остановить бота и сохранить артефакт с базой данных.
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug — check that secrets are actually visible here
        run: |
          check() {
            name="$1"
            val="$2"
            len=${#val}
            if [ "$len" -eq 0 ]; then
              echo "  $name: ПУСТО (длина 0) — GitHub не передал значение в этот job"
            else
              echo "  $name: OK (длина $len символов)"
            fi
          }
          echo "Проверка секретов, видимых текущему workflow:"
          check "BOT_TOKEN"     "${{ secrets.BOT_TOKEN }}"
          check "OWNER_ID"      "${{ secrets.OWNER_ID }}"
          check "GEMINI_KEY"    "${{ secrets.GEMINI_KEY }}"
          echo ""
          echo "Если тут ПУСТО, а в Settings → Secrets and variables → Actions секрет"
          echo "точно есть — самые частые причины:"
          echo "  1) секрет добавлен на вкладке Variables, а не Secrets;"
          echo "  2) секрет привязан к Environment (например production), а не к репозиторию;"
          echo "  3) опечатка в имени секрета или он добавлен не в тот репозиторий/форк."

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.BOT_TOKEN }}" ]; then
            echo "❌ Секрет BOT_TOKEN не задан."
            missing=1
          fi
          if [ -z "${{ secrets.OWNER_ID }}" ]; then
            echo "❌ Секрет OWNER_ID не задан."
            missing=1
          fi
          if [ -z "${{ secrets.GEMINI_KEY }}" ]; then
            echo "⚠️  Секрет GEMINI_KEY не задан — бот запустится, но ИИ-ответы будут отключены."
          fi
          if [ "$missing" = "1" ]; then
            echo ""
            echo "Добавь недостающие секреты: репозиторий → Settings → Secrets and variables → Actions → New repository secret."
            echo "Обязательные: BOT_TOKEN, OWNER_ID, GEMINI_KEY."
            exit 1
          fi

      - name: Restore database from previous run
        # На самом первом запуске артефакта ещё не существует — шаг покажет
        # "Error: Artifact not found for name: bot-database" в логе, это
        # нормально и не останавливает workflow благодаря continue-on-error.
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bot-database
          path: .

      - name: Create .env file from secrets
        run: |
          {
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}"
            echo "OWNER_ID=${{ secrets.OWNER_ID }}"
            echo "SUPPORT_GROUP_ID=${{ secrets.SUPPORT_GROUP_ID }}"
            echo "GEMINI_KEY=${{ secrets.GEMINI_KEY }}"
            echo "GEMINI_MODEL=${{ secrets.GEMINI_MODEL || 'gemini-3.5-flash' }}"
            echo "GEMINI_MODEL_FALLBACK=${{ secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}"
            echo "OWNER_NAME=${{ secrets.OWNER_NAME }}"
            echo "BUSINESS_NAME=${{ secrets.BUSINESS_NAME }}"
            echo "BUSINESS_DESCRIPTION=${{ secrets.BUSINESS_DESCRIPTION }}"
            echo "AI_LANGUAGE=${{ secrets.AI_LANGUAGE || 'ru' }}"
            echo "AI_HISTORY_DEPTH=${{ secrets.AI_HISTORY_DEPTH || '10' }}"
            echo "DATABASE_PATH=bot.db"
            echo "LOG_LEVEL=INFO"
          } >> .env

      - name: Run bot (stops itself 10 min before the job timeout)
        run: timeout --signal=TERM 340m python bot.py || true

      - name: Save database for the next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-database
          path: bot.db
          retention-days: 7
          overwrite: true

